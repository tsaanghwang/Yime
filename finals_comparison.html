<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韵母分类数据对比</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.9.4/dist/full.css" rel="stylesheet" type="text/css" />
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8">韵母分类数据对比分析</h1>
        
        <!-- 统计卡片 -->
        <div class="stats shadow mb-8 bg-white">
            <div class="stat">
                <div class="stat-title">总韵母数</div>
                <div class="stat-value text-primary">42</div>
                <div class="stat-desc">当前系统处理总数</div>
            </div>
            
            <div class="stat">
                <div class="stat-title">单质韵母</div>
                <div class="stat-value text-secondary">12</div>
                <div class="stat-desc">占比28.6%</div>
            </div>
            
            <div class="stat">
                <div class="stat-title">复合韵母</div>
                <div class="stat-value text-accent">30</div>
                <div class="stat-desc">占比71.4%</div>
            </div>
        </div>

        <!-- 数据对比表格 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="card bg-base-100 shadow-md">
                <div class="card-body">
                    <h2 class="card-title text-lg font-semibold">当前分类结果</h2>
                    <div class="overflow-x-auto">
                        <table class="table table-zebra">
                            <thead>
                                <tr>
                                    <th>韵母类型</th>
                                    <th>数量</th>
                                    <th>占比</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>单质韵母</td>
                                    <td>12</td>
                                    <td>28.6%</td>
                                </tr>
                                <tr>
                                    <td>后长韵母</td>
                                    <td>6</td>
                                    <td>14.3%</td>
                                </tr>
                                <tr>
                                    <td>前长韵母</td>
                                    <td>8</td>
                                    <td>19.0%</td>
                                </tr>
                                <tr>
                                    <td>三质韵母</td>
                                    <td>16</td>
                                    <td>38.1%</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card bg-base-100 shadow-md">
                <div class="card-body">
                    <h2 class="card-title text-lg font-semibold">预期标准</h2>
                    <div class="overflow-x-auto">
                        <table class="table table-zebra">
                            <thead>
                                <tr>
                                    <th>韵母类型</th>
                                    <th>数量</th>
                                    <th>占比</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>单质韵母</td>
                                    <td>12</td>
                                    <td>28.6%</td>
                                </tr>
                                <tr>
                                    <td>后长韵母</td>
                                    <td>6</td>
                                    <td>14.3%</td>
                                </tr>
                                <tr>
                                    <td>前长韵母</td>
                                    <td>8</td>
                                    <td>19.0%</td>
                                </tr>
                                <tr>
                                    <td>三质韵母</td>
                                    <td>16</td>
                                    <td>38.1%</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- 遗漏检查区 -->
        <div class="card bg-base-100 shadow-md mb-8">
            <div class="card-body">
                <h2 class="card-title text-lg font-semibold">遗漏检查</h2>
                <div class="alert alert-success shadow-lg">
                    <div>
                        <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current flex-shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <span>当前未检测到遗漏韵母，所有42个韵母均已正确分类。</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="flex justify-center gap-4">
            <button class="btn btn-primary">导出对比报告</button>
            <button class="btn btn-outline">返回</button>
        </div>
    </div>
</body>
</html>
