<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字符统计结果</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.9.4/dist/full.css" rel="stylesheet" type="text/css" />
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="card w-full max-w-md bg-white shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl font-bold text-gray-800 mb-4">字符统计结果</h2>
            
            <div class="stats shadow">
                <div class="stat">
                    <div class="stat-title text-gray-600">总字符数</div>
                    <div class="stat-value text-primary">52</div>
                </div>
                
                <div class="stat">
                    <div class="stat-title text-gray-600">Private Use Area</div>
                    <div class="stat-value text-secondary">30</div>
                    <div class="stat-desc text-gray-500">(U+E000 - U+F8FF)</div>
                </div>
            </div>

            <div class="mt-6">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-gray-700">ASCII字符</span>
                    <span class="font-medium">22</span>
                </div>
                <div class="flex justify-between items-center mb-2">
                    <span class="text-gray-700">Private Use Area</span>
                    <span class="font-medium">30</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-700">其他Unicode</span>
                    <span class="font-medium">0</span>
                </div>
            </div>

            <div class="divider"></div>

            <div class="alert alert-info shadow-lg">
                <div>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="stroke-current flex-shrink-0 w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span>Private Use Area字符占比57.7%</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
