<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音标排序对比</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.9.4/dist/full.css" rel="stylesheet" type="text/css" />
    <style>
        .phoneme-card {
            transition: all 0.3s ease;
        }
        .phoneme-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="min-h-screen bg-base-100">
    <div class="container mx-auto px-4 py-8">
        <!-- 标题区域 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-primary mb-2">音标排序对比展示</h1>
            <p class="text-lg text-gray-600">展示修改前后的音标排序效果</p>
        </div>

        <!-- 对比展示区域 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <!-- 排序前 -->
            <div class="card bg-base-200 shadow-xl phoneme-card">
                <div class="card-body">
                    <h2 class="card-title text-secondary">原始音标顺序</h2>
                    <div class="flex flex-wrap gap-2">
                        <template id="original-phonemes">
                            <span class="badge badge-lg badge-neutral">音标</span>
                        </template>
                    </div>
                </div>
            </div>

            <!-- 排序后 -->
            <div class="card bg-base-200 shadow-xl phoneme-card">
                <div class="card-body">
                    <h2 class="card-title text-accent">新音标顺序</h2>
                    <div class="flex flex-wrap gap-2">
                        <template id="sorted-phonemes">
                            <span class="badge badge-lg badge-primary">音标</span>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <!-- 音标顺序列表 -->
        <div class="card bg-base-100 shadow-lg mb-8">
            <div class="card-body">
                <h2 class="card-title text-info">标准音标顺序</h2>
                <div class="overflow-x-auto">
                    <table class="table table-zebra">
                        <thead>
                            <tr>
                                <th>序号</th>
                                <th>音标</th>
                                <th>Unicode</th>
                            </tr>
                        </thead>
                        <tbody id="standard-order">
                            <!-- 将通过JS填充 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 状态区域 -->
        <div class="alert alert-success shadow-lg">
            <div>
                <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current flex-shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>音标排序已成功更新并验证</span>
            </div>
        </div>
    </div>

    <script>
        // 定义音标顺序
        const PHONEME_ORDER = [
            "ᴀ", "a", "æ", "ɑ", "o", "ɤ", "𐞑", "ᴇ", "e", "ə", "ᵊ",
            "i", "ɪ", "u", "ᴜ", "ʏ", "y", "ʅ", "ɚ", "m", "n", "ŋ"
        ];

        // 模拟原始音标数据 (实际应用中应从JSON文件获取)
        const originalPhonemes = [...PHONEME_ORDER].sort(() => Math.random() - 0.5);
        
        // 渲染原始音标
        const originalContainer = document.querySelector('#original-phonemes').parentElement;
        originalPhonemes.forEach(phoneme => {
            const badge = document.createElement('span');
            badge.className = 'badge badge-lg badge-neutral';
            badge.textContent = phoneme;
            originalContainer.appendChild(badge);
        });

        // 渲染排序后音标
        const sortedContainer = document.querySelector('#sorted-phonemes').parentElement;
        PHONEME_ORDER.forEach(phoneme => {
            const badge = document.createElement('span');
            badge.className = 'badge badge-lg badge-primary';
            badge.textContent = phoneme;
            sortedContainer.appendChild(badge);
        });

        // 渲染标准顺序表格
        const tableBody = document.getElementById('standard-order');
        PHONEME_ORDER.forEach((phoneme, index) => {
            const row = document.createElement('tr');
            
            const indexCell = document.createElement('td');
            indexCell.textContent = index + 1;
            
            const phonemeCell = document.createElement('td');
            phonemeCell.textContent = phoneme;
            
            const unicodeCell = document.createElement('td');
            unicodeCell.textContent = 'U+' + phoneme.codePointAt(0).toString(16).toUpperCase();
            
            row.appendChild(indexCell);
            row.appendChild(phonemeCell);
            row.appendChild(unicodeCell);
            tableBody.appendChild(row);
        });
    </script>
</body>
</html>
