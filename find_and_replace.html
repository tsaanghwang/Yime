<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音元分类器名称修改工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.9.4/dist/full.css" rel="stylesheet" type="text/css" />
    <style>
        .match-highlight {
            background-color: #fef08a;
            padding: 0.1rem 0.2rem;
            border-radius: 0.25rem;
        }
        .file-path {
            color: #6b7280;
            font-family: monospace;
            font-size: 0.875rem;
        }
    </style>
</head>
<body class="bg-base-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="card bg-base-200 shadow-xl">
            <div class="card-body">
                <h1 class="card-title text-2xl font-bold mb-6">音元分类器名称修改工具</h1>
                
                <!-- 查找区域 -->
                <div class="mb-8">
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">查找内容</span>
                        </label>
                        <div class="join">
                            <input type="text" id="searchInput" placeholder="输入要查找的内容" 
                                   class="input input-bordered join-item w-full" 
                                   value="音元分类器" />
                            <button class="btn btn-primary join-item" onclick="searchFiles()">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                </svg>
                                查找
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- 替换区域 -->
                <div class="mb-8">
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">替换为</span>
                        </label>
                        <div class="join">
                            <input type="text" id="replaceInput" placeholder="输入替换内容" 
                                   class="input input-bordered join-item w-full" />
                            <button class="btn btn-accent join-item" onclick="replaceAll()">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                </svg>
                                全部替换
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- 结果展示区 -->
                <div class="mb-8">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold">查找结果</h2>
                        <span id="resultCount" class="badge badge-primary">0 个匹配项</span>
                    </div>
                    
                    <div id="searchResults" class="bg-base-100 rounded-lg border border-base-300 p-4 max-h-96 overflow-y-auto">
                        <div class="text-center text-gray-500 py-8">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <p>暂无查找结果</p>
                        </div>
                    </div>
                </div>
                
                <!-- 操作按钮 -->
                <div class="flex justify-end gap-2">
                    <button class="btn btn-ghost">取消</button>
                    <button class="btn btn-primary" onclick="saveChanges()">保存更改</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let searchResults = [];
        
        function searchFiles() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            if (!searchTerm) {
                alert('请输入查找内容');
                return;
            }
            
            // 模拟查找结果 - 实际应用中这里应该是AJAX请求
            searchResults = [
                {
                    filePath: "tools/finals_classifier.py",
                    lineNumber: 12,
                    lineContent: "class 音元分类器:",
                    fullContent: "class 音元分类器:\n    def __init__(self):\n        self.model = load_model()\n\n    def predict(self, input):\n        return self.model.predict(input)"
                },
                {
                    filePath: "tools/finals_classifier.py",
                    lineNumber: 45,
                    lineContent: "分类器 = 音元分类器()",
                    fullContent: "# 初始化分类器\n分类器 = 音元分类器()\n\n# 使用分类器\nresult = 分类器.predict(data)"
                },
                {
                    filePath: "tests/test_finals_classifier.py",
                    lineNumber: 8,
                    lineContent: "from tools.finals_classifier import 音元分类器",
                    fullContent: "import unittest\nfrom tools.finals_classifier import 音元分类器\n\nclass TestFinalsClassifier(unittest.TestCase):\n    def setUp(self):\n        self.classifier = 音元分类器()"
                }
            ];
            
            displayResults(searchTerm);
        }
        
        function displayResults(searchTerm) {
            const resultsContainer = document.getElementById('searchResults');
            const resultCount = document.getElementById('resultCount');
            
            if (searchResults.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <p>没有找到匹配项</p>
                    </div>
                `;
                resultCount.textContent = '0 个匹配项';
                return;
            }
            
            let html = '';
            const regex = new RegExp(searchTerm, 'g');
            
            searchResults.forEach((result, index) => {
                const highlightedContent = result.lineContent.replace(regex, 
                    match => `<span class="match-highlight">${match}</span>`);
                
                html += `
                    <div class="mb-6 border-b border-base-300 pb-4 last:border-b-0 last:pb-0">
                        <div class="flex justify-between items-start mb-2">
                            <span class="file-path">${result.filePath}:${result.lineNumber}</span>
                            <button class="btn btn-xs btn-outline" onclick="showFullContent(${index})">
                                查看完整内容
                            </button>
                        </div>
                        <div class="bg-base-300 rounded p-3 font-mono">
                            ${highlightedContent}
                        </div>
                        <div class="mt-2 flex justify-end">
                            <div class="join">
                                <button class="btn btn-xs btn-outline join-item" onclick="replaceSingle(${index})">
                                    替换此项
                                </button>
                                <button class="btn btn-xs btn-outline join-item" onclick="goToFile(${index})">
                                    转到文件
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            resultsContainer.innerHTML = html;
            resultCount.textContent = `${searchResults.length} 个匹配项`;
        }
        
        function replaceSingle(index) {
            const replaceTerm = document.getElementById('replaceInput').value.trim();
            if (!replaceTerm) {
                alert('请输入替换内容');
                return;
            }
            
            const result = searchResults[index];
            const regex = new RegExp(document.getElementById('searchInput').value.trim(), 'g');
            result.lineContent = result.lineContent.replace(regex, replaceTerm);
            result.fullContent = result.fullContent.replace(regex, replaceTerm);
            
            // 更新显示
            displayResults(document.getElementById('searchInput').value.trim());
            
            // 提示用户
            alert(`已替换 ${result.filePath}:${result.lineNumber} 中的内容`);
        }
        
        function replaceAll() {
            const replaceTerm = document.getElementById('replaceInput').value.trim();
            if (!replaceTerm) {
                alert('请输入替换内容');
                return;
            }
            
            const searchTerm = document.getElementById('searchInput').value.trim();
            const regex = new RegExp(searchTerm, 'g');
            
            searchResults.forEach(result => {
                result.lineContent = result.lineContent.replace(regex, replaceTerm);
                result.fullContent = result.fullContent.replace(regex, replaceTerm);
            });
            
            // 更新显示
            displayResults(searchTerm);
            
            // 提示用户
            alert(`已替换所有 ${searchResults.length} 处匹配项`);
        }
        
        function showFullContent(index) {
            const result = searchResults[index];
            const searchTerm = document.getElementById('searchInput').value.trim();
            const regex = new RegExp(searchTerm, 'g');
            
            const highlightedContent = result.fullContent.replace(regex, 
                match => `<span class="match-highlight">${match}</span>`);
            
            alert(`
文件: ${result.filePath}
行号: ${result.lineNumber}

${highlightedContent.replace(/\n/g, '<br>')}
            `);
        }
        
        function goToFile(index) {
            const result = searchResults[index];
            alert(`将导航到文件: ${result.filePath} (模拟)`);
            // 实际应用中这里应该打开或跳转到对应文件
        }
        
        function saveChanges() {
            if (searchResults.length === 0) {
                alert('没有需要保存的更改');
                return;
            }
            
            // 实际应用中这里应该是AJAX请求保存所有更改
            alert('所有更改已保存');
        }
    </script>
</body>
</html>
