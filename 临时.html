<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermaid 实时渲染器</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/javascript/javascript.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/theme/monokai.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: white;
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: #f0f0f0;
            font-size: 1.2rem;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .main-content {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
            }
        }

        .editor-panel, .preview-panel {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        h2 {
            color: #2c3e50;
            font-size: 1.5rem;
        }

        .editor-container {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }

        #mermaid-editor {
            width: 100%;
            height: 100%;
            min-height: 400px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            border: none;
            resize: none;
            outline: none;
        }

        .preview-container {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: auto;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            background: white;
        }

        .examples {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .examples-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .example-btn {
            padding: 12px 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-align: center;
        }

        .example-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .error-message {
            color: #e74c3c;
            margin-top: 10px;
            padding: 10px;
            background: #ffeaea;
            border-radius: 5px;
            display: none;
        }

        .mermaid {
            text-align: center;
            width: 100%;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Mermaid 实时渲染器</h1>
            <p class="subtitle">在左侧编辑Mermaid代码，右侧实时查看渲染结果。无需刷新页面，立即查看图表变化。</p>
        </header>

        <div class="main-content">
            <div class="editor-panel">
                <div class="panel-header">
                    <h2>Mermaid 代码编辑器</h2>
                    <button id="render-btn" class="btn-primary">渲染图表</button>
                </div>
                <div class="editor-container">
                    <textarea id="mermaid-editor" placeholder="在此输入Mermaid代码...">graph TD
    A[浏览器] -->|解析| B(Mermaid代码)
    B --> C{渲染为SVG}
    C -->|成功| D[显示图表]
    C -->|失败| E[显示错误]
    E --> B</textarea>
                </div>
                <div id="error-message" class="error-message"></div>
            </div>

            <div class="preview-panel">
                <div class="panel-header">
                    <h2>图表预览</h2>
                    <span id="status">就绪</span>
                </div>
                <div class="preview-container">
                    <div id="mermaid-preview" class="mermaid">
                        <!-- Mermaid图表将在这里渲染 -->
                    </div>
                </div>
            </div>
        </div>

        <div class="examples">
            <h2>常用示例</h2>
            <div class="examples-grid">
                <button class="example-btn" data-example="flowchart">流程图</button>
                <button class="example-btn" data-example="sequence">序列图</button>
                <button class="example-btn" data-example="gantt">甘特图</button>
                <button class="example-btn" data-example="pie">饼图</button>
                <button class="example-btn" data-example="state">状态图</button>
                <button class="example-btn" data-example="class">类图</button>
            </div>
        </div>

        <footer>
            <p>Mermaid 实时渲染器 &copy; 2023 | 使用 Mermaid.js 库</p>
        </footer>
    </div>

    <script>
        // 初始化Mermaid
        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            flowchart: {
                useMaxWidth: true,
                htmlLabels: true,
                curve: 'basis'
            }
        });

        // 获取DOM元素
        const editor = document.getElementById('mermaid-editor');
        const preview = document.getElementById('mermaid-preview');
        const renderBtn = document.getElementById('render-btn');
        const errorMessage = document.getElementById('error-message');
        const status = document.getElementById('status');
        const exampleButtons = document.querySelectorAll('.example-btn');

        // 渲染函数
        function renderMermaid() {
            const code = editor.value;

            // 清除之前的错误信息
            errorMessage.style.display = 'none';
            status.textContent = '渲染中...';

            try {
                // 清除之前的图表
                preview.innerHTML = '';

                // 插入新的Mermaid代码
                const mermaidDiv = document.createElement('div');
                mermaidDiv.className = 'mermaid';
                mermaidDiv.textContent = code;
                preview.appendChild(mermaidDiv);

                // 渲染图表
                mermaid.init(undefined, preview.querySelectorAll('.mermaid'));
                status.textContent = '渲染成功';
            } catch (error) {
                // 显示错误信息
                errorMessage.textContent = '错误: ' + error.message;
                errorMessage.style.display = 'block';
                status.textContent = '渲染失败';
            }
        }

        // 初始渲染
        renderMermaid();

        // 添加事件监听器
        renderBtn.addEventListener('click', renderMermaid);

        // 示例代码
        const examples = {
            flowchart: `graph TB
    A[音节] --> |当韵母是单质韵母时|A1[第一类音节]
    A[音节] --> |当韵母是前长韵母时|A2[第二类音节]
    A[音节] --> |当韵母是后长韵母时|A3[第三类音节]
    A[音节] --> |当韵母是三质韵母时|A4[第四类音节]

    A1 --> |提取|B1[节调]
    A2 --> |提取|B2[节调]
    A3 --> |提取|B3[节调]
    A4 --> |提取|B4[节调]


    A1 --> |提取|C1[节质]
    A2 --> |提取|C2[节质]
    A3 --> |提取|C3[节质]
    A4 --> |提取|C4[节质]

    C1 --> |切分|D1[声母]
    C2 --> |切分|D2[声母]
    C3 --> |切分|D3[声母]
    C4 --> |切分|D4[声母]

    C1 --> |切分|E1[韵母]
    C2 --> |切分|E2[韵母]
    C3 --> |切分|E3[韵母]
    C4 --> |切分|E4[韵母]

    B1 --> F1[节调]
    F1 --> F2[节调]
    F2 --> F3[节调]
    D1 --> F4[声母]
    F4 --> F5[声母]
    E1 --> |又分析为|F6[韵质]
    F6 --> |又分析为|F7[韵腹]

    B2 --> G1[节调]
    G1 --> G2[节调]
    G2 --> G3[节调]
    D2 --> G4[声母]
    G4 --> G5[声母]
    E2 --> |又分析为|G6[韵质]
    G6 --> |切分|G7[韵腹]
    G6 --> |切分|G8[韵尾]

    B3 --> H1[节调]
    H1 --> H2[节调]
    H2 --> H3[节调]
    D3 --> H4[声母]
    H4 --> H5[声母]
    E3 --> |切分|H6[介质]
    E3 --> |切分|H7[韵质]
    H6 --> |又分析为|H8[韵头]
    H7 --> |又分析为|H9[韵腹]

    B4 --> I0[节调]
    I0 --> I1[节调]
    I1 --> I2[节调]
    D4 --> I3[声母]
    I3 --> I4[声母]
    E4 --> |切分|I5[介质]
    E4 --> |切分|I6[韵质]
    I5 --> |切分|I7[韵头]
    I6 --> |切分|I8[韵腹]
    I6 --> |切分|I9[韵尾]
`,

            sequence: `sequenceDiagram
    participant A as 用户
    participant B as 浏览器
    participant C as 服务器

    A->>B: 输入Mermaid代码
    B->>C: 发送渲染请求
    C->>B: 返回SVG数据
    B->>A: 显示图表`,

            gantt: `gantt
    title 项目开发计划
    dateFormat  YYYY-MM-DD
    section 设计
    需求分析      :done, des1, 2023-01-01, 7d
    技术设计      :active, des2, 2023-01-08, 5d
    section 开发
    前端开发      :dev1, 2023-01-15, 10d
    后端开发      :dev2, after des2, 12d
    section 测试
    功能测试      :2023-02-01, 5d
    用户验收      :2023-02-07, 3d`,

            pie: `pie title 浏览器使用占比
    "Chrome" : 45.6
    "Safari" : 22.8
    "Firefox" : 15.4
    "Edge" : 8.2
    "其他" : 8.0`,

            state: `stateDiagram-v2
    [*] --> 待机
    待机 --> 运行: 启动
    运行 --> 暂停: 暂停
    暂停 --> 运行: 继续
    运行 --> 待机: 停止
    暂停 --> 待机: 停止
    待机 --> [*]`,

            class: `classDiagram
    class Animal {
        +String name
        +int age
        +void eat()
        +void sleep()
    }

    class Dog {
        +String breed
        +void bark()
    }

    class Cat {
        +String color
        +void meow()
    }

    Animal <|-- Dog
    Animal <|-- Cat`
        };

        // 为示例按钮添加事件监听器
        exampleButtons.forEach(button => {
            button.addEventListener('click', () => {
                const exampleType = button.getAttribute('data-example');
                editor.value = examples[exampleType];
                renderMermaid();
            });
        });

        // 添加自动渲染功能（防抖处理）
        let timeoutId;
        editor.addEventListener('input', () => {
            clearTimeout(timeoutId);
            timeoutId = setTimeout(renderMermaid, 1000);
        });
    </script>
</body>
</html>
