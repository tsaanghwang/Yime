schema:
  schema_id: yime_full
  name: "Yime 等长模式"
  version: "2026-07-01"

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - table_translator@custom_phrase
    - table_translator
    - punct_translator

speller:
  alphabet: "qufvkc;gxwlj$op[strhdm.aibe%8/,y]1'n5HD64JKL7930z2SMAN@!#"
  delimiter: " "

translator:
  dictionary: yime_full
  enable_user_dict: true
  enable_sentence: false
  enable_completion: true

custom_phrase:
  dictionary: ""
  user_dict: custom_phrase_full
  db_class: stabledb
  enable_completion: true
  enable_sentence: false
  initial_quality: 1

menu:
  page_size: 5

punctuator:
  import_preset: default

key_binder:
  import_preset: default

