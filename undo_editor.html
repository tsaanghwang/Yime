<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>带撤销功能的代码编辑器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.9.4/dist/full.css" rel="stylesheet" type="text/css" />
    <style>
        .editor-container {
            height: calc(100vh - 80px);
        }
        #editor {
            height: 100%;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            line-height: 1.5;
            tab-size: 4;
        }
        .history-panel {
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-base-100">
    <div class="navbar bg-base-200 shadow-lg">
        <div class="flex-1">
            <a class="btn btn-ghost normal-case text-xl">代码编辑器</a>
        </div>
        <div class="flex-none gap-2">
            <div class="tooltip tooltip-bottom" data-tip="撤销 (Ctrl+Z)">
                <button id="undo-btn" class="btn btn-primary" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M7.707 3.293a1 1 0 010 1.414L5.414 7H11a7 7 0 017 7v2a1 1 0 11-2 0v-2a5 5 0 00-5-5H5.414l2.293 2.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
                    </svg>
                    撤销
                </button>
            </div>
            <div class="dropdown dropdown-end">
                <label tabindex="0" class="btn btn-ghost">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z" />
                    </svg>
                </label>
                <ul tabindex="0" class="mt-3 p-2 shadow menu menu-sm dropdown-content bg-base-100 rounded-box w-52">
                    <li><a id="show-history">操作历史</a></li>
                    <li><a id="clear-history">清空历史</a></li>
                </ul>
            </div>
        </div>
    </div>

    <div class="editor-container p-4">
        <textarea id="editor" class="textarea textarea-bordered w-full" placeholder="在此输入代码..."></textarea>
    </div>

    <!-- 操作历史面板 -->
    <div id="history-modal" class="modal">
        <div class="modal-box">
            <h3 class="font-bold text-lg">操作历史</h3>
            <div class="history-panel py-4">
                <ul id="history-list" class="menu">
                    <!-- 历史记录将在这里动态生成 -->
                </ul>
            </div>
            <div class="modal-action">
                <button id="close-history" class="btn">关闭</button>
            </div>
        </div>
    </div>

    <script>
        class EditorHistory {
            constructor() {
                this.history = [];
                this.currentIndex = -1;
                this.maxHistorySize = 100;
            }

            addState(state) {
                // 如果在历史中间添加新状态，则删除后面的状态
                if (this.currentIndex < this.history.length - 1) {
                    this.history = this.history.slice(0, this.currentIndex + 1);
                }

                // 限制历史记录大小
                if (this.history.length >= this.maxHistorySize) {
                    this.history.shift();
                    this.currentIndex--;
                }

                this.history.push(state);
                this.currentIndex = this.history.length - 1;
            }

            canUndo() {
                return this.currentIndex > 0;
            }

            undo() {
                if (this.canUndo()) {
                    this.currentIndex--;
                    return this.history[this.currentIndex];
                }
                return null;
            }

            getHistory() {
                return this.history.map((state, index) => ({
                    text: `操作 ${index + 1}`,
                    active: index === this.currentIndex
                }));
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const editor = document.getElementById('editor');
            const undoBtn = document.getElementById('undo-btn');
            const showHistoryBtn = document.getElementById('show-history');
            const clearHistoryBtn = document.getElementById('clear-history');
            const closeHistoryBtn = document.getElementById('close-history');
            const historyModal = document.getElementById('history-modal');
            const historyList = document.getElementById('history-list');

            const editorHistory = new EditorHistory();

            // 保存初始状态
            editorHistory.addState(editor.value);

            // 编辑器内容变化时保存状态
            editor.addEventListener('input', () => {
                editorHistory.addState(editor.value);
                updateUndoButton();
            });

            // 撤销功能
            undoBtn.addEventListener('click', () => {
                const previousState = editorHistory.undo();
                if (previousState !== null) {
                    editor.value = previousState;
                    updateUndoButton();
                    updateHistoryList();
                }
            });

            // 快捷键支持 (Ctrl+Z)
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'z') {
                    e.preventDefault();
                    undoBtn.click();
                }
            });

            // 显示历史面板
            showHistoryBtn.addEventListener('click', () => {
                updateHistoryList();
                historyModal.showModal();
            });

            // 关闭历史面板
            closeHistoryBtn.addEventListener('click', () => {
                historyModal.close();
            });

            // 清空历史
            clearHistoryBtn.addEventListener('click', () => {
                editorHistory.history = [editor.value];
                editorHistory.currentIndex = 0;
                updateUndoButton();
                updateHistoryList();
                historyModal.close();
            });

            // 更新撤销按钮状态
            function updateUndoButton() {
                undoBtn.disabled = !editorHistory.canUndo();
            }

            // 更新历史列表
            function updateHistoryList() {
                historyList.innerHTML = '';
                const historyItems = editorHistory.getHistory();
                
                historyItems.forEach((item, index) => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.textContent = item.text;
                    a.className = item.active ? 'active' : '';
                    
                    a.addEventListener('click', () => {
                        editor.value = editorHistory.history[index];
                        editorHistory.currentIndex = index;
                        updateHistoryList();
                    });
                    
                    li.appendChild(a);
                    historyList.appendChild(li);
                });
            }
        });
    </script>
</body>
</html>
