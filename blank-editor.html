<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能代码编辑器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto p-4 max-w-4xl">
        <!-- 状态栏 -->
        <div class="flex items-center justify-between mb-4 bg-white rounded-lg shadow-sm p-3">
            <div class="flex items-center space-x-2">
                <span class="text-sm font-medium text-gray-600">状态:</span>
                <div id="status-indicator" class="flex items-center">
                    <span class="relative flex h-3 w-3 mr-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
                    </span>
                    <span id="status-text" class="text-sm text-gray-600">已加载</span>
                </div>
            </div>
            <div class="text-xs text-gray-500">
                上次保存: <span id="last-saved">从未</span>
            </div>
        </div>

        <!-- 编辑器区域 -->
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <textarea 
                id="editor" 
                class="w-full h-96 p-4 text-gray-700 focus:outline-none resize-none font-mono text-sm"
                placeholder="请在此处输入您的代码..."
                spellcheck="false"
            ></textarea>
        </div>
    </div>

    <script>
        // 自动保存配置
        const AUTO_SAVE_INTERVAL = 3000; // 3秒自动保存
        let saveTimer = null;
        let isSaving = false;

        // 保存内容到本地存储
        async function saveContent(showNotification = true) {
            if(isSaving) return;
            
            isSaving = true;
            updateStatus('保存中...', 'blue-500');
            
            const content = document.getElementById('editor').value;
            localStorage.setItem('editorContent', content);
            
            // 模拟网络延迟
            await new Promise(resolve => setTimeout(resolve, 500));
            
            const now = new Date();
            document.getElementById('last-saved').textContent = 
                `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            
            if(showNotification) {
                showToast('内容已自动保存', 'bg-green-500');
            }
            
            updateStatus('已保存', 'green-500');
            isSaving = false;
        }

        // 更新状态指示器
        function updateStatus(text, color) {
            const indicator = document.querySelector('#status-indicator span:last-child');
            const textElement = document.getElementById('status-text');
            
            indicator.className = `relative inline-flex rounded-full h-3 w-3 bg-${color}`;
            textElement.textContent = text;
        }

        // 显示Toast通知
        function showToast(message, bgColor) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 px-4 py-2 rounded-md shadow-lg text-white ${bgColor} animate-fade-in-out`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'transition-opacity', 'duration-300');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 初始化编辑器
        window.onload = function() {
            // 加载上次保存的内容
            const savedContent = localStorage.getItem('editorContent');
            if(savedContent) {
                document.getElementById('editor').value = savedContent;
                updateStatus('已加载', 'green-500');
            }

            // 设置自动保存
            document.getElementById('editor').addEventListener('input', () => {
                updateStatus('编辑中...', 'yellow-500');
                
                // 重置计时器
                clearTimeout(saveTimer);
                saveTimer = setTimeout(() => saveContent(false), AUTO_SAVE_INTERVAL);
            });

            // 检查是否有未保存的内容
            window.addEventListener('beforeunload', (e) => {
                if(document.getElementById('editor').value !== localStorage.getItem('editorContent')) {
                    e.preventDefault();
                    e.returnValue = '您有未保存的更改，确定要离开吗？';
                    return e.returnValue;
                }
            });
        }
    </script>

    <style>
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(10px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
        .animate-fade-in-out {
            animation: fadeInOut 3s ease-in-out forwards;
        }
    </style>
</body>
</html>
