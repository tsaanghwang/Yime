name: Build

on:
  workflow_dispatch:
  push:
    branches: [main, yime-stable, 'codex/**']
    tags: ['v*']
  pull_request:
    branches: [main, yime-stable]

permissions:
  contents: read

jobs:
  build-contract:
    uses: tsaanghwang/Yime-build-contract/.github/workflows/validate.yml@d93a3e835cae58988792814d300d3c7cc872cfbb

  rust-i686-host:
    name: rust-i686-host
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned i686 host toolchain
        run: rustup toolchain install stable-i686-pc-windows-msvc --profile minimal
      - name: Run Rust checks
        shell: pwsh
        run: |
          Set-Location PIMELauncher
          cargo fmt --check
          rustup run stable-i686-pc-windows-msvc cargo test --verbose

  go-tests:
    name: go-tests
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - name: Use Go 1.26.4
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache-dependency-path: go-backend/go.sum
      - name: Run Go regression tests
        shell: pwsh
        run: .\tools\test-go.ps1

  real-rime-tests:
    name: real-rime-tests
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Use Go 1.26.4
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache-dependency-path: go-backend/go.sum
      - name: Fetch Rime shared data for integration tests
        shell: pwsh
        run: |
          $dataDir = 'go-backend\input_methods\yime\data'
          if (-not (Test-Path "$dataDir\default.yaml")) {
            git clone --depth=1 https://github.com/gaboolic/rime-frost.git $env:RUNNER_TEMP\rime-frost
            Copy-Item -Force $env:RUNNER_TEMP\rime-frost\default.yaml $dataDir\
            Get-ChildItem $env:RUNNER_TEMP\rime-frost\*.yaml | Where-Object { $_.Name -notlike '*.custom*' } | Copy-Item -Force -Destination $dataDir\
            if (Test-Path $env:RUNNER_TEMP\rime-frost\opencc) {
              Copy-Item -Recurse -Force $env:RUNNER_TEMP\rime-frost\opencc $dataDir\
            }
          }
      - name: Run real Rime integration tests
        shell: pwsh
        run: .\tools\test-real-rime.ps1

  go-race-msys2:
    name: go-race-msys2
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - name: Use Go 1.26.4
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache-dependency-path: go-backend/go.sum
      - name: Install MSYS2 UCRT64 GCC for Go race detector
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc
      - name: Run Go race detector
        shell: pwsh
        run: |
          $gcc = Join-Path '${{ steps.msys2.outputs.msys2-location }}' 'ucrt64\bin\gcc.exe'
          .\tools\test-go-race.ps1 -GccPath $gcc -TimeoutSeconds 300

  native-build:
    name: native-build
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - name: Checkout active TSF submodule
        shell: pwsh
        run: git submodule update --init --depth 1 libIME2
      - name: Set up MSVC developer environment
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if (-not (Test-Path $vswhere)) { throw "vswhere.exe was not found at $vswhere" }
          $installPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $installPath) { throw 'A Visual Studio installation with x86/x64 VC tools was not found.' }
          $vsDevCmd = Join-Path $installPath 'Common7\Tools\VsDevCmd.bat'
          if (-not (Test-Path $vsDevCmd)) { throw "VsDevCmd.bat was not found at $vsDevCmd" }
          $envDump = Join-Path $env:RUNNER_TEMP 'vsdevcmd-env.txt'
          cmd /c "`"$vsDevCmd`" -arch=x64 -host_arch=x64 >nul && set > `"$envDump`""
          if ($LASTEXITCODE -ne 0) { throw 'VsDevCmd.bat failed.' }
          Get-Content $envDump | ForEach-Object {
            if ($_ -match '^(.*?)=(.*)$') {
              "$($matches[1])=$($matches[2])" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
          }
      - name: Install pinned i686 host toolchain
        run: rustup toolchain install stable-i686-pc-windows-msvc --profile minimal
      - name: Verify Win32 Rust and Corrosion pins
        shell: pwsh
        run: .\tools\assert-win32-build-prerequisites.ps1 -RequireToolchain
      - name: Build Win32 C++ components
        shell: cmd
        run: |
          call "%VSINSTALLDIR%Common7\Tools\VsDevCmd.bat" -arch=x86 -host_arch=x64 >nul
          cmake . -Bbuild -G "Visual Studio 17 2022" -A Win32 -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build --config Release
      - name: Build x64 C++ components
        shell: cmd
        run: |
          call "%VSINSTALLDIR%Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64 >nul
          cmake . -Bbuild64 -G "Visual Studio 17 2022" -A x64 -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build64 --config Release --target PIMETextService
      - name: Run native C++ regression tests
        shell: pwsh
        run: ctest --test-dir build -C Release --output-on-failure
      - name: Verify native build outputs
        shell: pwsh
        run: .\tools\test-build-guards.ps1
      - name: Stage native installer inputs
        shell: pwsh
        run: |
          $stage = Join-Path $env:RUNNER_TEMP 'yime-native'
          New-Item -ItemType Directory -Path "$stage\build\PIMELauncher", "$stage\build\PIMETextService\Release", "$stage\build64\PIMETextService\Release" -Force | Out-Null
          Copy-Item build\PIMELauncher\PIMELauncher.exe "$stage\build\PIMELauncher\PIMELauncher.exe"
          Copy-Item build\PIMETextService\Release\PIMETextService.dll "$stage\build\PIMETextService\Release\PIMETextService.dll"
          Copy-Item build64\PIMETextService\Release\PIMETextService.dll "$stage\build64\PIMETextService\Release\PIMETextService.dll"
      - uses: actions/upload-artifact@v6
        with:
          name: yime-native-${{ github.sha }}
          path: ${{ runner.temp }}/yime-native
          if-no-files-found: error
          retention-days: 14

  installer-package:
    name: installer-package
    runs-on: windows-2022
    needs: [build-contract, rust-i686-host, native-build, go-tests, real-rime-tests, go-race-msys2]
    steps:
      - uses: actions/checkout@v6
      - name: Restore native installer inputs
        uses: actions/download-artifact@v7
        with:
          name: yime-native-${{ github.sha }}
          path: .
      - name: Use Go 1.26.4
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache-dependency-path: go-backend/go.sum
      - name: Install pinned go-winres
        shell: pwsh
        run: go install github.com/tc-hib/go-winres@v0.3.3
      - name: Install NSIS
        uses: repolevedavaj/install-nsis@v1.2.0
        with:
          nsis-version: 3.08
      - name: Fetch Rime shared data when absent
        shell: pwsh
        run: |
          $dataDir = 'go-backend\input_methods\yime\data'
          if (-not (Test-Path "$dataDir\default.yaml")) {
            git clone --depth=1 https://github.com/gaboolic/rime-frost.git $env:RUNNER_TEMP\rime-frost
            Copy-Item -Force $env:RUNNER_TEMP\rime-frost\default.yaml $dataDir\
            Get-ChildItem $env:RUNNER_TEMP\rime-frost\*.yaml | Where-Object { $_.Name -notlike '*.custom*' } | Copy-Item -Force -Destination $dataDir\
            if (Test-Path $env:RUNNER_TEMP\rime-frost\opencc) {
              Copy-Item -Recurse -Force $env:RUNNER_TEMP\rime-frost\opencc $dataDir\
            }
          }
      - name: Build Go backend package
        shell: pwsh
        run: |
          Push-Location go-backend
          cmd /C build.bat
          if ($LASTEXITCODE -ne 0) { throw "go-backend build failed with exit code $LASTEXITCODE" }
          Pop-Location
      - name: Import release signing certificate
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          YIME_SIGN_CERT_BASE64: ${{ secrets.YIME_SIGN_CERT_BASE64 }}
          YIME_SIGN_CERT_PASSWORD: ${{ secrets.YIME_SIGN_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:YIME_SIGN_CERT_BASE64)) {
            throw 'Tagged releases require YIME_SIGN_CERT_BASE64.'
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP 'yime-release.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:YIME_SIGN_CERT_BASE64))
          try {
            $password = ConvertTo-SecureString $env:YIME_SIGN_CERT_PASSWORD -AsPlainText -Force
            $certificate = @(Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password) |
              Where-Object HasPrivateKey | Select-Object -First 1
          } finally {
            Remove-Item -LiteralPath $pfxPath -Force -ErrorAction SilentlyContinue
          }
          if (-not $certificate) { throw 'The release certificate could not be imported.' }
          $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signTool) { throw 'signtool.exe was not found in the Windows SDK.' }
          "YIME_SIGN_CERT_SHA1=$($certificate.Thumbprint)" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "YIME_SIGNTOOL_EXE=$($signTool.FullName)" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          'YIME_RELEASE_SIGNING_REQUIRED=1' | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Sign release payload
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: .\tools\sign-release.ps1 -RequireComplete
      - name: Build the installer
        shell: pwsh
        run: |
          Set-Location installer
          & 'C:\Program Files (x86)\NSIS\Bin\makensis.exe' installer.nsi
          if ($LASTEXITCODE -ne 0) { throw "makensis failed with exit code $LASTEXITCODE" }
      - name: Verify tagged release signatures
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: .\tools\verify-release-signatures.ps1 -IncludeInstaller
      - name: Write commit-addressed build manifest
        shell: pwsh
        run: .\tools\write-build-manifest.ps1
      - name: Smoke-test unsigned installer on ephemeral runner
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        run: |
          $installer = Get-ChildItem installer\YIME-*-setup.exe | Select-Object -First 1
          if (-not $installer) { throw 'Unsigned installer was not found.' }
          .\tools\test-installer-smoke.ps1 -InstallerPath $installer.FullName
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ startsWith(github.ref, 'refs/tags/v') && 'YIME-signed-installer' || format('YIME-unsigned-test-installer-{0}', github.sha) }}
          path: |
            installer/YIME-*-setup.exe
            installer/build-manifest.json
          if-no-files-found: error
          retention-days: 30

  core-build:
    name: core-build
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [build-contract, rust-i686-host, native-build, go-tests, real-rime-tests, go-race-msys2, installer-package]
    steps:
      - name: Preserve legacy aggregate build contract
        shell: bash
        env:
          CONTRACT_RESULT: ${{ needs['build-contract'].result }}
          RUST_RESULT: ${{ needs['rust-i686-host'].result }}
          NATIVE_RESULT: ${{ needs['native-build'].result }}
          GO_RESULT: ${{ needs['go-tests'].result }}
          REAL_RIME_RESULT: ${{ needs['real-rime-tests'].result }}
          RACE_RESULT: ${{ needs['go-race-msys2'].result }}
          INSTALLER_RESULT: ${{ needs['installer-package'].result }}
        run: |
          test "$CONTRACT_RESULT" = success
          test "$RUST_RESULT" = success
          test "$NATIVE_RESULT" = success
          test "$GO_RESULT" = success
          test "$REAL_RIME_RESULT" = success
          test "$RACE_RESULT" = success
          test "$INSTALLER_RESULT" = success
