name: Build

on:
  push:
    branches: [yime-stable]
  pull_request:
    branches: [yime-stable]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: 'true'
      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
      - name: Use Node.js 21.x
        uses: actions/setup-node@v4
        with:
          node-version: 21.x
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc
      - name: Run Rust tests
        run: |
          cd PIMELauncher
          cargo test --verbose
      - name: Use Install NSIS
        uses: repolevedavaj/install-nsis@v1.2.0
        with:
          nsis-version: 3.08
      - name: Run build.bat
        shell: pwsh
        env:
          Rust_COMPILER: ${{ env.CARGO_HOME }}\bin\rustc.exe
        run: cmd /C "build.bat --sanitized"
      - name: Verify native build outputs
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter "PIMETextService.dll" | ForEach-Object { $_.FullName }
          if (-not (Test-Path "build\PIMETextService\Release\PIMETextService.dll")) {
            Write-Error "Missing Win32 PIMETextService.dll"
            exit 1
          }
          if (-not (Test-Path "build64\PIMETextService\Release\PIMETextService.dll")) {
            Write-Error "Missing x64 PIMETextService.dll"
            exit 1
          }
          if (-not (Test-Path "build\PIMELauncher\Release\PIMELauncher.exe")) {
            Write-Error "Missing PIMELauncher.exe"
            exit 1
          }
      - name: Build the installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\NSIS\Bin\makensis.exe" ".\installer\installer.nsi"
      - uses: actions/upload-artifact@v4
        with:
          name: Installer
          path: installer/*.exe
