name: Build

on:
  push:
    branches: [yime-stable]
  pull_request:
    branches: [yime-stable]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'
      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
      - name: Use Node.js 21.x
        uses: actions/setup-node@v4
        with:
          node-version: 21.x
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc
      - name: Run Rust tests
        run: |
          cd PIMELauncher
          cargo test --verbose
      - name: Use Install NSIS
        uses: repolevedavaj/install-nsis@v1.2.0
        with:
          nsis-version: 3.08

      - name: Build Win32 C++ components
        shell: pwsh
        run: |
          cmake . -Bbuild -G "Visual Studio 17 2022" -A Win32 -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build --config Release

      - name: Build x64 C++ components
        shell: pwsh
        run: |
          cmake . -Bbuild64 -G "Visual Studio 17 2022" -A x64 -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build64 --config Release --target PIMETextService

      - name: Build Go backend
        shell: pwsh
        run: |
          pushd go-backend
          cmd /C build.bat
          popd

      - name: Build McBopomofo
        shell: pwsh
        run: |
          pushd McBopomofoWeb
          npm install
          npm run build:pime
          popd
          if (Test-Path "node\input_methods\McBopomofo") { Remove-Item -Recurse -Force "node\input_methods\McBopomofo" }
          New-Item -ItemType Directory -Force -Path "node\input_methods\McBopomofo" | Out-Null
          Copy-Item -Recurse -Force "McBopomofoWeb\output\pime\*" "node\input_methods\McBopomofo\"

      - name: Verify native build outputs
        shell: pwsh
        run: |
          Write-Host "=== Listing all PIMETextService.dll ==="
          Get-ChildItem -Recurse -Filter "PIMETextService.dll" | ForEach-Object { $_.FullName }
          Write-Host "=== Listing build directory ==="
          Get-ChildItem -Recurse -Path "build" -Filter "*.dll" | ForEach-Object { $_.FullName }
          Get-ChildItem -Recurse -Path "build" -Filter "*.exe" | ForEach-Object { $_.FullName }

      - name: Build the installer
        shell: pwsh
        run: |
          Set-Location installer
          & "C:\Program Files (x86)\NSIS\Bin\makensis.exe" "installer.nsi"

      - uses: actions/upload-artifact@v4
        with:
          name: Installer
          path: installer/*.exe
